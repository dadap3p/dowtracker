
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P3R Weekday Widget</title>

<style>
:root{
  --scale:1;

  --blue:#1657e8;
  --dark:#1b2268;
  --light:#7fb4ff;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:transparent;
  margin:0;
  padding:0;
}

/* =========================
   MAIN WIDGET
========================= */

.widget{

  width:100%;
  max-width:600px;

  aspect-ratio:320 / 90;

  position:relative;

  background:var(--dark);

  overflow:hidden;

  border-left:
    calc(4px * var(--scale))
    solid
    var(--blue);
}

/* =========================
   CORNER
========================= */

.corner{

  position:absolute;

  top:0;
  left:0;

  width:15%;

  aspect-ratio:1;

  background:var(--light);

  clip-path:
    polygon(
      0 0,
      100% 0,
      0 100%
    );
}

.slot{

  position:absolute;

  top:4%;

  left:3%;

  color:#15245f;

  font-size:
    clamp(
      0.8rem,
      2vw,
      1.8rem
    );

  font-weight:900;
}

/* =========================
   DIAGONAL BAND
========================= */

.blue-band{

  position:absolute;

  inset:0;

  background:
  linear-gradient(
      135deg,
      var(--blue) 0%,
      var(--blue) 45%,
      transparent 45%
  );
}

/* =========================
   CONTENT
========================= */

.content{

  position:relative;

  z-index:2;

  height:100%;

  display:flex;

  align-items:center;

  padding-left:20%;

  gap:4%;
}

.day{
  font-size:clamp(1rem, 8vw, 3.25rem);
}

.label{
  font-size:clamp(.45rem, 2vw, 1.1rem);
}

.slot{
  font-size:clamp(.75rem, 2vw, 1.75rem);
}

/* =========================
   MOON
========================= */

.moon{

  margin-left:auto;

  margin-right:5%;

  width:13%;

  aspect-ratio:1;

  border-radius:50%;

  background:
      radial-gradient(
          circle at 70% 50%,
          black 52%,
          transparent 53%
      ),
      #7db2ff;
}

/* =========================
   MOBILE
========================= */

@media (max-width:400px){

  .content{
      padding-left:24%;
  }

}
</style>
</head>

<body>

<div class="widget">
  <div class="corner"></div>
  <div class="slot">1</div>
  <div class="blue-band"></div>

  <div class="content">
    <div id="day" class="day">MON</div>

    <div class="label">
      Current<br>Day
    </div>

    <div class="moon"></div>
  </div>
</div>

<script>
const days = [
  "SUN",
  "MON",
  "TUE",
  "WED",
  "THU",
  "FRI",
  "SAT"
];

document.getElementById("day").textContent =
  days[new Date().getDay()];
</script>

</body>
</html>
