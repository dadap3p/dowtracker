
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P3R Weekday Widget</title>

<style>
:root{
  --scale: 1; /* 👈 control this */
  
  --blue:#1657e8;
  --dark:#1b2268;
  --light:#7fb4ff;
  --white:#ffffff;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  transform-origin: top left;
  background:transparent;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial Black,sans-serif;
}

.widget{
  position:relative;
  width: calc(320px * var(--scale));
  height: calc(90px * var(--scale));
  background:var(--dark);
  overflow:hidden;
  border-left: calc(4px * var(--scale)) solid var(--blue);
}

.corner{
  width: calc(50px * var(--scale));
  height: calc(50px * var(--scale));
}

.slot{
  top: calc(4px * var(--scale));
  left: calc(10px * var(--scale));
  font-size: calc(28px * var(--scale));
}

.blue-band{
  position:absolute;
  inset:0;
  background:linear-gradient(
    135deg,
    var(--blue) 0%,
    var(--blue) 45%,
    transparent 45%
  );
}

.content{
  padding-left: calc(65px * var(--scale));
  gap: calc(16px * var(--scale));
}

.day{
  font-size: calc(52px * var(--scale));
}

.label{
  font-size: calc(18px * var(--scale));
}

.moon{
  margin-right: calc(20px * var(--scale));
  width: calc(42px * var(--scale));
  height: calc(42px * var(--scale));
}
</style>
</head>

<body>

<div style="position:fixed;top:10px;left:10px;z-index:999;">
  <input id="scale" type="range" min="0.5" max="2" step="0.05" value="1">
</div>

<script>
const root = document.documentElement;
document.getElementById("scale").addEventListener("input", e=>{
  root.style.setProperty("--scale", e.target.value);
});
</script>
const days = [
  "SUN",
  "MON",
  "TUE",
  "WED",
  "THU",
  "FRI",
  "SAT"
];

document.getElementById("day").textContent =
  days[new Date().getDay()];
</script>

</body>
</html>
